<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Kailua Community Basketball League logo">
  <defs>
    <style>
      .blue { fill: #4B83B0; }
      .white { fill: #FFFFFF; }
      .ringtext {
        font-family: Arial, Helvetica, sans-serif;
        font-weight: 700;
        letter-spacing: 6px;
        fill: #4B83B0;
      }
      .smalltext {
        font-family: Georgia, 'Times New Roman', serif;
