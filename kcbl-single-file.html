<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KCBL</title>
<style>
body{font-family:Arial;margin:0;background:#eef6f6;color:#123}
header{padding:20px;background:#2d6ea2;color:white;text-align:center}
section{padding:40px}
.hero{background:#dff2f7;text-align:center}
.btn{display:inline-block;padding:12px 20px;background:#2d6ea2;color:white;border-radius:20px;text-decoration:none}
form{max-width:500px;margin:auto}
input,select,textarea{width:100%;margin:10px 0;padding:10px}
</style>
</head>
<body>

<header>
<h1>Kailua Community Basketball League</h1>
<p>Kailua • Oʻahu</p>
</header>

<section class="hero">
<h2>Building Kailua’s next generation</h2>
<p>Youth basketball rooted in community and aloha</p>
<a class="btn" href="#form">Register</a>
</section>

<section>
<h2>Programs</h2>
<ul>
<li>League Season</li>
<li>Spring Clinics</li>
<li>Girls Select</li>
</ul>
</section>

<section>
<h2>Sponsors</h2>
<p>Support Kailua youth and community</p>
</section>

<section id="form">
<h2>Register / Sponsor</h2>
<form action="https://formspree.io/f/mlgpkpzv" method="POST">
<input name="name" placeholder="Name" required>
<input name="email" placeholder="Email" required>
<select name="interest">
<option>Registration</option>
<option>Sponsorship</option>
</select>
<textarea name="message" placeholder="Message"></textarea>
<button class="btn" type="submit">Send</button>
</form>
</section>

</body>
</html>
